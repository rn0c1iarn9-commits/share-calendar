<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夫婦共有カレンダー</title>
<link rel="manifest" href="manifest.json?v=4">

<style>
body { font-family: sans-serif; margin: 10px; }
h2 { text-align: center; }

.controls { text-align: center; margin-bottom: 10px; }

button {
  padding: 6px 8px;
  margin: 3px;
  font-size: 12px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.header {
  text-align: center;
  font-weight: bold;
  background: #eee;
  padding: 2px 0;
}

.day {
  border: 1px solid #ccc;
  min-height: 90px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.date {
  font-size: 12px;
  font-weight: bold;
  text-align: right;
  margin: 2px;
}

.slot {
  flex: 1;
  display: flex;
  align-items: stretch;
  margin: 0;
  padding: 0;
}

.day::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  border-top: 1px dotted #999;
  pointer-events: none;
}

select {
  width: 100%;
  font-size: 12px;
  border: none;
  background: transparent;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  height: 100%;
}

.work { background: #e0f7fa; }
.home { background: #e8f5e9; }
.holiday { background: #ffebee; }
.other { background: #f3e5f5; }

@media (max-width:600px){
  .day { min-height: 70px; font-size: 10px; }
}
</style>
</head>

<body>

<h2 id="title"></h2>

<div class="controls">
  <button onclick="changeMonth(-1)">←</button>
  <button onclick="changeMonth(1)">→</button><br>
  <button onclick="fillWork('wife')">さっちゃん：空欄→出勤</button>
  <button onclick="fillWork('husband')">夫：空欄→出勤</button><br>
  <button onclick="clearMonth('wife')">妻：この月を全消去</button>
  <button onclick="clearMonth('husband')">夫：この月を全消去</button>
</div>

<div class="calendar" id="calendar"></div>

<!-- Firebase SDK（バージョン付きでキャッシュ無効化） -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=4"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js?v=4"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBpqGSTUi0169frgCUWY-BWgwVmIVa77bI",
  authDomain: "schedulesharing-5a98b.firebaseapp.com",
  projectId: "schedulesharing-5a98b",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const calendarId = "family-calendar"; 
let current = new Date();
const options = ["", "出勤", "在宅", "休日", "その他"];
const week = ["日","月","火","水","木","金","土"];

function getKey(day,type){ return `${current.getFullYear()}-${current.getMonth()}-${day}-${type}`; }
async function saveData(key,value){ await db.collection("calendars").doc(calendarId).set({ [key]: value }, {merge:true}); }

function createSelect(day,type){
  const sel = document.createElement("select");
  sel.dataset.type = type;
  sel.dataset.key = getKey(day,type);
  options.forEach(o=>{ const opt=document.createElement("option"); opt.value=o; opt.textContent=o; sel.appendChild(opt); });
  sel.addEventListener("change", ()=>{ saveData(sel.dataset.key, sel.value); applyColor(sel); });
  return sel;
}

function applyColor(sel){
  sel.className="";
  if(sel.value==="出勤") sel.classList.add("work");
  if(sel.value==="在宅") sel.classList.add("home");
  if(sel.value==="休日") sel.classList.add("holiday");
  if(sel.value==="その他") sel.classList.add("other");
}

function generateCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";
  const y=current.getFullYear(), m=current.getMonth();
  document.getElementById("title").textContent=`${y}年 ${m+1}月`;

  week.forEach(d=>{ const h=document.createElement("div"); h.className="header"; h.textContent=d; cal.appendChild(h); });

  const firstDay = new Date(y,m,1).getDay();
  const lastDay = new Date(y,m+1,0).getDate();
  for(let i=0;i<firstDay;i++) cal.appendChild(document.createElement("div"));

  for(let d=1; d<=lastDay; d++){
    const box=document.createElement("div"); box.className="day";
    const date=document.createElement("div"); date.className="date"; date.textContent=d;

    const wifeSlot = document.createElement("div"); wifeSlot.className="slot"; wifeSlot.appendChild(createSelect(d,"wife"));
    const husbandSlot = document.createElement("div"); husbandSlot.className="slot"; husbandSlot.appendChild(createSelect(d,"husband"));

    box.appendChild(date);
    box.appendChild(wifeSlot);
    box.appendChild(husbandSlot);
    cal.appendChild(box);
  }
}

function fillWork(type){
  document.querySelectorAll(`select[data-type="${type}"]`).forEach(sel=>{ if(sel.value===""){ sel.value="出勤"; sel.dispatchEvent(new Event("change")); } });
}

function clearMonth(type){
  if(!confirm(`${type==="wife"?"妻":"夫"}のこの月を削除しますか？`)) return;
  const y=current.getFullYear(), m=current.getMonth();
  const last=new Date(y,m+1,0).getDate();
  for(let d=1; d<=last; d++){
    const key=`${y}-${m}-${d}-${type}`;
    document.querySelectorAll(`select[data-key="${key}"]`).forEach(sel=>{ sel.value=""; applyColor(sel); });
    saveData(key,"");
  }
}

function changeMonth(n){ current.setMonth(current.getMonth()+n); generateCalendar(); }

/* リアルタイム同期 */
firebase.firestore().collection("calendars").doc(calendarId)
.onSnapshot(snap=>{ if(!snap.exists) return; const data = snap.data(); document.querySelectorAll("select").forEach(sel=>{ const key=sel.dataset.key; if(data[key]!==undefined){ sel.value=data[key]; applyColor(sel); } }); });

/* Service Worker: キャッシュ強制更新 */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js?v=4").then(reg => {
    reg.update();
  });
}

generateCalendar();
window.fillWork = fillWork;
window.clearMonth = clearMonth;
window.changeMonth = changeMonth;
</script>

</body>
</html>
