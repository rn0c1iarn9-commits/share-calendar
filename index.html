<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共有カレンダー</title>
<style>
body { font-family: sans-serif; margin: 10px; }
h2 { text-align: center; margin:0; }

.top-left {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 1000;
}

button {
  padding: 6px 8px;
  margin: 3px;
  font-size: 12px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.header {
  text-align: center;
  font-weight: bold;
  background: #eee;
  padding: 2px 0;
}

.day {
  border: 1px solid #ccc;
  min-height: 90px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.day.today { border: 4px solid #4caf50; }

.date {
  font-size: 12px;
  font-weight: bold;
  text-align: center;
  margin: 2px 0;
}

.day.sun .date,
.day.holiday .date { color: red; }

#title {
  cursor: pointer;
  text-decoration: underline;
  color: #333;
}

.nav-buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 5px 0;
  gap: 5px; /* タイトルと矢印の間隔を狭く */
}

.slot {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.day::after {
  content: "";
  position: absolute;
  top: 60%;
  width: 100%;
  border-top: 1px dotted #aaa;
}

select {
  width: 100%;
  text-align: center;
  border: none;
  background: transparent;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  height: 90%;
}

.work { background: #b66e6e; }
.home { background: #5f89a4; }
.dayoff { background: #6fb381; }

.sub { opacity: 0.3; }

#settings {
  display:none;
  position:fixed;
  top:20%;
  left:10%;
  width:80%;
  background:#fff;
  border:1px solid #ccc;
  padding:15px;
  z-index:2000;
}

#fill-buttons {
  text-align:center;
  margin:10px 0;
}
</style>
</head>
<body>

<div class="top-left">
  <button onclick="openSettings()">⚙️</button>
</div>

<!-- 月タイトルと矢印 -->
<div class="nav-buttons">
  <button onclick="changeMonth(-1)">←</button>
  <h2 id="title" onclick="goToCurrentMonth()"></h2>
  <button onclick="changeMonth(1)">→</button>
</div>

<!-- 「空欄→出社」ボタンは設定外、設定ボタン下 -->
<div id="fill-buttons">
  <button id="fill1" onclick="fillWork('user1')"></button>
  <button id="fill2" onclick="fillWork('user2')"></button>
</div>

<div class="calendar" id="calendar"></div>

<!-- 設定 -->
<div id="settings">
  <h3>設定</h3>
  <div>
    User1 名前：<input id="name1">
    <button id="clear1" onclick="clearMonth('user1')"></button>
  </div>
  <div>
    User1 色：<input type="color" id="color1">
  </div>
  <br>
  <div>
    User2 名前：<input id="name2">
    <button id="clear2" onclick="clearMonth('user2')"></button>
  </div>
  <div>
    User2 色：<input type="color" id="color2">
  </div>
  <br>
  <button onclick="saveSettings()">保存</button>
  <button onclick="closeSettings()">閉じる</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBpqGSTUi0169frgCUWY-BWgwVmIVa77bI",
  authDomain: "schedulesharing-5a98b.firebaseapp.com",
  projectId: "schedulesharing-5a98b",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let current = new Date();
let latestData = {};
let holidays = {};
let unsubscribe = null;

const options = ["", "出社", "在宅", "休日"];
const week = ["日","月","火","水","木","金","土"];

let settings = {
  name1: "User1",
  name2: "User2",
  color1: "#ff6666",
  color2: "#6666ff"
};

async function loadHolidayData(year){
  try {
    const res = await fetch(`https://holidays-jp.github.io/api/v1/${year}/date.json`);
    if (!res.ok) throw new Error("祝日API取得失敗");
    holidaysOfYear = await res.json();
  } catch (e) {
    console.warn("祝日データ取得エラー:", e);
    holidaysOfYear = {};
  }
}

function loadSettings(){
  const s = localStorage.getItem("settings");
  if(s) settings = JSON.parse(s);
}

function applySettingsUI(){
  fill1.textContent = `${settings.name1}：空欄→出社`;
  fill2.textContent = `${settings.name2}：空欄→出社`;

  clear1.textContent = `${settings.name1}：表示月の入力削除`;
  clear2.textContent = `${settings.name2}：表示月の入力削除`;

  fill1.style.color = settings.color1;
  fill2.style.color = settings.color2;
  clear1.style.color = settings.color1;
  clear2.style.color = settings.color2;
}

function openSettings(){
  document.getElementById("settings").style.display="block";
  name1.value = settings.name1;
  name2.value = settings.name2;
  color1.value = settings.color1;
  color2.value = settings.color2;
}

function closeSettings(){
  document.getElementById("settings").style.display="none";
}

function saveSettings(){
  settings.name1 = name1.value;
  settings.name2 = name2.value;
  settings.color1 = color1.value;
  settings.color2 = color2.value;
  localStorage.setItem("settings", JSON.stringify(settings));
  applySettingsUI();
  closeSettings();
  generateCalendar();
}

function formatDateKey(date){
  return date.toISOString().split("T")[0];
}

function saveData(date,type,value){
  return db.collection("calendars")
    .doc("family-calendar")
    .collection("days")
    .doc(formatDateKey(date))
    .set({[type]:value},{merge:true});
}

function createSelect(date,type){
  const sel=document.createElement("select");
  sel.dataset.date = formatDateKey(date);
  sel.dataset.type = type;
  sel.style.color = type==="user1" ? settings.color1 : settings.color2;

  options.forEach(o=>{
    const opt=document.createElement("option");
    opt.value=o;
    opt.textContent=o;
    sel.appendChild(opt);
  });

  sel.onchange=()=>{ saveData(date,type,sel.value); applyColor(sel); };
  return sel;
}

function applyColor(sel){
  sel.className="";
  if(sel.value==="出社") sel.classList.add("work");
  if(sel.value==="在宅") sel.classList.add("home");
  if(sel.value==="休日") sel.classList.add("dayoff");
}

function applyData(){
  document.querySelectorAll("select").forEach(sel=>{
    const d=sel.dataset.date;
    const t=sel.dataset.type;
    if(latestData[d] && latestData[d][t]){
      sel.value=latestData[d][t];
      applyColor(sel);
    }
  });
}

async function generateCalendar(){  
  // まず祝日を読み込む
  const y = current.getFullYear();
  await loadHolidayData(y);
  calendar.innerHTML="";
  const m=current.getMonth();
  title.textContent=`${y}年 ${m+1}月`;

  // 曜日ヘッダー
  week.forEach(d=>{
    const h=document.createElement("div");
    h.className="header";
    h.textContent=d;
    calendar.appendChild(h);
  });

  const firstDay = new Date(y,m,1).getDay();
  const lastDate = new Date(y,m+1,0).getDate();
  const prevLast = new Date(y,m,0).getDate();
  let days = [];

  // 前月
  for(let i=firstDay-1;i>=0;i--){
    const d = prevLast - i;
    days.push({date:new Date(y, m-1, d), sub:true});
  }
  // 当月
  for(let d=1; d<=lastDate; d++){
    days.push({date:new Date(y, m, d), sub:false});
  }
  // 翌月
  const remain = 7 - (days.length % 7);
  if(remain < 7){
    for(let i=1; i<=remain; i++){
      days.push({date:new Date(y, m+1, i), sub:true});
    }
  }

  // 描画
  days.forEach(obj=>{
    const dateObj = obj.date;
    const box=document.createElement("div");
    box.className="day";
    if(obj.sub) box.classList.add("sub");

    const today = new Date();
    if(formatDateKey(today) === formatDateKey(dateObj)) box.classList.add("today");
    if(dateObj.getDay() === 0) box.classList.add("sun");

    // 祝日判定（APIデータにあるかどうか）
    const key = formatDateKey(dateObj);
    if (holidaysOfYear[key]) {
      box.classList.add("holiday");
    }
    // 祝日例
    const holidays=["2026-01-01","2026-01-13"];
    if(holidays.includes(formatDateKey(dateObj))) box.classList.add("holiday");

    const date=document.createElement("div");
    date.className="date";
    date.textContent=dateObj.getDate();

    const s1=document.createElement("div");
    s1.className="slot"; s1.appendChild(createSelect(dateObj,"user1"));
    const s2=document.createElement("div");
    s2.className="slot"; s2.appendChild(createSelect(dateObj,"user2"));

    box.append(date,s1,s2);
    calendar.appendChild(box);
  });
  applyData();
}

function subscribe(){
  if(unsubscribe) unsubscribe();
  unsubscribe = db.collection("calendars")
    .doc("family-calendar")
    .collection("days")
    .onSnapshot(snap=>{
      latestData={};
      snap.forEach(doc=>{ latestData[doc.id]=doc.data(); });
      applyData();
    });
}

function changeMonth(n){ current.setMonth(current.getMonth()+n); generateCalendar(); }

function fillWork(type){
  document.querySelectorAll(`select[data-type="${type}"]`).forEach(sel=>{
    if(!sel.value){ sel.value="出社"; sel.dispatchEvent(new Event("change")); }
  });
}

function clearMonth(type){
  if(!confirm("削除しますか？")) return;

  const y = current.getFullYear();
  const m = current.getMonth();

  document.querySelectorAll(`select[data-type="${type}"]`).forEach(sel=>{
    const selDate = new Date(sel.dataset.date);
    if(selDate.getFullYear() === y && selDate.getMonth() === m){
      sel.value="";
      sel.dispatchEvent(new Event("change"));
    }
  });
}

function goToCurrentMonth(){ current=new Date(); generateCalendar(); }

let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  const diff=e.changedTouches[0].clientX-startX;
  if(diff>50) changeMonth(-1);
  if(diff<-50) changeMonth(1);
});

loadSettings();
applySettingsUI();
generateCalendar();
subscribe();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js?v=8").then(reg=>{ reg.update(); });
}
</script>

</body>
</html>
