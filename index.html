<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夫婦共有カレンダー</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: sans-serif; margin: 10px; }
h2 { text-align: center; }

.controls { text-align: center; margin-bottom: 10px; }

button {
  padding: 8px;
  margin: 3px;
  font-size: 13px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.header {
  text-align: center;
  font-weight: bold;
  background: #eee;
}

.day {
  border: 1px solid #ccc;
  min-height: 110px;
  padding: 3px;
  display: flex;
  flex-direction: column;
}

.date {
  font-size: 12px;
  font-weight: bold;
}

select {
  width: 100%;
  font-size: 12px;
  margin-top: 2px;
}

.work { background: #e0f7fa; }
.home { background: #e8f5e9; }
.holiday { background: #ffebee; }
.other { background: #f3e5f5; }

@media (max-width:600px){
  .day { min-height: 85px; font-size: 10px; }
}
</style>
</head>

<body>

<h2 id="title"></h2>

<div class="controls">
  <button onclick="changeMonth(-1)">←</button>
  <button onclick="changeMonth(1)">→</button><br>
  <button onclick="fillWork('wife')">妻：空欄→出勤</button>
  <button onclick="fillWork('husband')">夫：空欄→出勤</button><br>
  <button onclick="clearMonth()">この月を全消去</button>
</div>

<div class="calendar" id="calendar"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* 自分のFirebase設定に変更 */
const firebaseConfig = {
  apiKey: "AIzaSyBpqGSTUi0169frgCUWY-BWgwVmIVa77bI",
  authDomain: "schedulesharing-5a98b.firebaseapp.com",
  projectId: "schedulesharing-5a98b",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const calendarId = "family-calendar"; // ←夫婦で同じにする

let current = new Date();
let holidays = {};

const options = ["", "出勤", "在宅", "休日", "その他"];
const week = ["日","月","火","水","木","金","土"];

function getKey(day, type){
  return `${current.getFullYear()}-${current.getMonth()}-${day}-${type}`;
}

/* 祝日取得 */
async function loadHolidays(year){
  const res = await fetch(`https://holidays-jp.github.io/api/v1/${year}/date.json`);
  holidays = await res.json();
}

/* 保存（Firebase + local） */
async function saveData(key, value){
  if(value === ""){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key, value);
  }

  await setDoc(doc(db,"calendars",calendarId),{
    [key]: value
  },{ merge:true });
}

/* セレクト生成 */
function createSelect(day,type){
  const sel = document.createElement("select");
  sel.dataset.type = type;
  sel.dataset.key = getKey(day,type);

  options.forEach(o=>{
    const opt = document.createElement("option");
    opt.value = o;
    opt.textContent = o;
    sel.appendChild(opt);
  });

  const saved = localStorage.getItem(sel.dataset.key);
  if(saved !== null) sel.value = saved;

  applyColor(sel);

  sel.addEventListener("change",()=>{
    saveData(sel.dataset.key, sel.value);
    applyColor(sel);
  });

  return sel;
}

/* 色 */
function applyColor(sel){
  sel.className="";
  if(sel.value==="出勤") sel.classList.add("work");
  if(sel.value==="在宅") sel.classList.add("home");
  if(sel.value==="休日") sel.classList.add("holiday");
  if(sel.value==="その他") sel.classList.add("other");
}

/* カレンダー生成 */
async function generateCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const y = current.getFullYear();
  const m = current.getMonth();

  document.getElementById("title").textContent=`${y}年 ${m+1}月`;

  await loadHolidays(y);

  week.forEach(d=>{
    const h=document.createElement("div");
    h.className="header";
    h.textContent=d;
    cal.appendChild(h);
  });

  const firstDay = new Date(y,m,1).getDay();
  const last = new Date(y,m+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let d=1;d<=last;d++){
    const box=document.createElement("div");
    box.className="day";

    const date=document.createElement("div");
    date.className="date";

    const keyDate = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

    date.textContent=d;

    if(holidays[keyDate]){
      date.style.color="red";
      date.title=holidays[keyDate];
    }

    const wife=createSelect(d,"wife");
    const husband=createSelect(d,"husband");

    box.appendChild(date);
    box.appendChild(wife);
    box.appendChild(husband);

    cal.appendChild(box);
  }
}

/* 空欄だけ出勤 */
function fillWork(type){
  document.querySelectorAll(`select[data-type="${type}"]`)
    .forEach(sel=>{
      if(sel.value===""){
        sel.value="出勤";
        sel.dispatchEvent(new Event("change"));
      }
    });
}

/* 月削除 */
function clearMonth(){
  if(!confirm("この月を削除しますか？")) return;

  const y=current.getFullYear();
  const m=current.getMonth();
  const last=new Date(y,m+1,0).getDate();

  ["wife","husband"].forEach(t=>{
    for(let d=1;d<=last;d++){
      const key=`${y}-${m}-${d}-${t}`;
      localStorage.removeItem(key);
      saveData(key,"");
    }
  });

  generateCalendar();
}

/* 月変更 */
function changeMonth(n){
  current.setMonth(current.getMonth()+n);
  generateCalendar();
}

/* リアルタイム同期 */
onSnapshot(doc(db,"calendars",calendarId),(snap)=>{
  if(!snap.exists()) return;
  const data=snap.data();

  document.querySelectorAll("select").forEach(sel=>{
    const key=sel.dataset.key;
    if(data[key]!==undefined){
      sel.value=data[key];
      applyColor(sel);
    }
  });
});

/* Service Worker */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

generateCalendar();

window.fillWork = fillWork;
window.clearMonth = clearMonth;
window.changeMonth = changeMonth;

</script>

</body>
</html>
